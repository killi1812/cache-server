name: deployment

on:
  push:
    branches: ["master"]
  pull_request:
    types: [closed]
    branches: ["master"]

jobs:
  deployment:
    runs-on: ubuntu-latest
    environment: homelab
    steps:
      - uses: actions/checkout@v4

      - name: Trigger Deploy Webhook
        run: 'curl -X POST -H "X-Api-Key: ${{ homelab.WEBHOOK_SECRET }}" https://webhook.francvok.from.hr/hooks/cache-server'
