name: deployment

on:
  workflow_call:
    secrets:
      WEBHOOK_SECRET:
        required: true

jobs:
  deployment:
    runs-on: ubuntu-latest
    environment: homelab
    steps:
      - name: Trigger Deploy Webhook
        env:
          WEBHOOK_SECRET: ${{ secrets.WEBHOOK_SECRET }}
        run: |
          curl -v -A "Mozilla/5.0 (Windows NT 10.0; Win64; x64; rv:124.0) Gecko/20100101 Firefox/124.0" \
               -X POST -H "X-Api-Key: $WEBHOOK_SECRET" \
               https://webhook.francvok.from.hr/hooks/cache-server
