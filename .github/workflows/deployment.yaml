name: deployment

on:
  workflow_call:
    secrets:
      WEBHOOK_SECRET:
        required: true

jobs:
  deployment:
    runs-on: ubuntu-latest
    environment: homelab
    steps:
      - name: Trigger Deploy Webhook
        uses: fjogeleit/http-webhook-action@v1.6.5
        with:
          url: "https://webhook.francvok.from.hr/hooks/cache-server"
          method: "POST"
          headers: '{"X-Api-Key": "${{ secrets.WEBHOOK_SECRET }}"}'
          # Using a real user agent in the action too
          customHeaders: '{"User-Agent": "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36"}'
