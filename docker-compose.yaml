services:
  db:
    image: postgres
    restart: on-failure
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_USER: postgres
      POSTGRES_DB: cachesrv
    ports:
      - "5332:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-u", "postgres", "-d", "cachesrv"]
      start_period: 1s
      interval: 0.5s
      retries: 5
      timeout: 0.5s

  adminer:
    image: adminer
    restart: on-failure
    ports:
      - 8080:8080

  minio:
    image: minio/minio
    restart: on-failure
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: admin1234
    command: server --console-address ":9001" /data

volumes:
  postgres_data:
