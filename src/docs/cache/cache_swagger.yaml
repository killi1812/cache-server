basePath: /
info:
  contact: {}
  description: API for nix binary cache interactions (narinfo, nar, etc).
  title: Binary Cache API
  version: "1.0"
paths:
  /{narUuid}:
    put:
      consumes:
      - application/octet-stream
      description: Upload raw NAR data for a given UUID.
      parameters:
      - description: NAR UUID
        in: path
        name: narUuid
        required: true
        type: string
      responses:
        "201":
          description: Created
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Upload NAR data
      tags:
      - binary-cache
  /{storeHash}:
    get:
      description: Get metadata (.narinfo) or file listing (.ls) for a store hash.
      parameters:
      - description: Store hash with extension (.narinfo or .ls)
        in: path
        name: storeHash
        required: true
        type: string
      produces:
      - text/plain
      - application/json
      responses:
        "200":
          description: ls json
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
      summary: Get .narinfo or .ls
      tags:
      - binary-cache
  /nar/{filename}:
    get:
      description: Download a NAR file from the cache.
      parameters:
      - description: NAR filename (with or without .nar extension)
        in: path
        name: filename
        required: true
        type: string
      produces:
      - application/octet-stream
      responses:
        "200":
          description: OK
          schema:
            type: file
        "404":
          description: Not Found
      summary: Download NAR file
      tags:
      - binary-cache
  /nix-cache-info:
    get:
      description: Get information about the nix store configuration.
      produces:
      - text/plain
      responses:
        "200":
          description: 'StoreDir: /nix/store...'
          schema:
            type: string
      summary: Get nix-cache-info
      tags:
      - binary-cache
swagger: "2.0"
