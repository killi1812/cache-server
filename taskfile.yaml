version: "3"

vars:
  BINARY_DIR: ./bin
  APP_NAME: cache-server
  CODE_DIR: ./src
  PACKAGE: "github.com/killi1812/go-cache-server"

tasks:
  default:
    cmds:
      - task: list-tools
    silent: false

  dev:
    description: build project binary for development
    cmds:
      - task: build-int
        vars:
          BUILD: "dev"
    silent: true

  build-int:
    description: build project binary
    vars:
      VERSION:
        sh: git describe --tags --always --abbrev=0 --match='v[0-9]*.[0-9]*.[0-9]*' 2> /dev/null | sed 's/^.//'
      COMMIT_HASH:
        sh: git rev-parse --short HEAD
      BUILD_TIMESTAMP:
        sh: date '+%Y-%m-%dT%H:%M:%S'
      LDFLAGS: "-X '{{.PACKAGE}}/app.Build={{.BUILD}}' -X '{{.PACKAGE}}/app.Version={{.VERSION}}' -X '{{.PACKAGE}}/app.CommitHash={{.COMMIT_HASH}}' -X '{{.PACKAGE}}/app.BuildTimestamp={{.BUILD_TIMESTAMP}}'"
    cmds:
      - cmd: "echo 'Build info\n\tBuild:\t\t{{.BUILD}}\n\tVersion:\t{{.VERSION}}\n\tCommit:\t\t{{.COMMIT_HASH}}\n\tTime Stamp:\t{{.BUILD_TIMESTAMP}}'"
      - task: lint
      - cmd: mkdir -p {{.BINARY_DIR}}
      - cmd: go build -C {{.CODE_DIR}} -ldflags="{{.LDFLAGS}}" -v -o ../{{.BINARY_DIR}}/{{.APP_NAME}}
    silent: true
    internal: true

  build:
    description: build a project
    vars:
      BUILD: "prod"
    cmds:
      - task: build-int
        vars:
          BUILD: "{{.BUILD}}"
    silent: true

  install:
    description: install project as your local binary
    cmds:
      - task: build
      - cmd: echo "Generating completions"
      - cmd: "{{.BINARY_DIR}}/{{.APP_NAME}} completion zsh > _{{.APP_NAME}}"
      - cmd: sudo mkdir -p /usr/share/zsh/site-functions
      - cmd: sudo cp _{{.APP_NAME}} /usr/share/zsh/site-functions/

      # BUG: eval: 34:22: parameter expansion requires a literal
      # - cmd: source ~/.zshrc
      - cmd: rm -f _{{.APP_NAME}}

      # TODO: Implement installation
    silent: false

  test:
    dir: "{{.CODE_DIR}}"
    description: run project tests
    cmd: go test -v -count=1 -parallel 10 ./...
    silent: true

  coverage:
    dir: "{{.CODE_DIR}}"
    description: creates project coverage file
    cmds:
      - cmd: go test -coverprofile=../coverage.out ./...
      - cmd: go tool cover -html=../coverage.out
    silent: true

  start:
    description: start poroject development enviroment
    cmds:
      - cmd: docker compose up {{.CLI_ARGS}}
    silent: true

  lint:
    description: Run linters and formatters
    dir: "{{.CODE_DIR}}"
    cmds:
      - cmd: go vet
      - cmd: go fmt
      - cmd: swag fmt
      - cmd: swag init -g api.go --instanceName management -o docs/management -d api,model
      - cmd: swag init -g cacheApi.go --instanceName cache -o docs/cache -d cmd/cache,model
    silent: false

  list-tools:
    cmds:
      - go version
      - swag -version
      - gcc --version
      - task --version
      - nix --version
      - cachix --version
    silent: true
